# 動作設定（機密でない項目）。このファイルを config/config.yml にコピーして使う。
#   cp config/config.example.yml config/config.yml
# 企業ID・トークン・エンドポイントは .env で設定します。

work:
  # 打刻を行う時刻。cron 設定例（punch crontab）の生成に使う。
  # ※ AKASHI は打刻を「実行時刻」で記録するため、実際の記録時刻は
  #    cron がこの時刻に punch を起動したタイミング（秒単位のブレあり）。
  clock_in:  "09:30"
  clock_out: "18:00"

  # ランダム打刻: 
  # 指定時刻から下記分数以内のランダムな時刻に打刻する。
  #   0      = 指定時刻ちょうど（従来動作）
  #   1..30  = 指定時刻〜+N分 のランダムな時刻（目安は 5）
  # 仕組み: cron は上記 clock_in/clock_out（＝ウィンドウ先頭）に punch を起動し、
  #         プロセスが 0〜N分のランダム秒だけ sleep してから打刻する。
  #         例) 退勤を 18:20〜18:25 にしたい → clock_out: "18:20" / random_window_minutes: 5
  random_window_minutes: 0       # in/out 共通の既定
  # clock_in_window:  0          # 出勤だけ別のウィンドウにしたい場合（任意・上書き）
  # clock_out_window: 5          # 退勤だけ別のウィンドウにしたい場合（任意・上書き）

schedule:
  weekdays_only: true            # 平日のみ打刻
  skip_japanese_holidays: true   # 日本の祝日はスキップ
  exclude_dates:                 # 出勤しない日（年末年始・有給等） YYYY-MM-DD
    - "2026-12-29"
    - "2026-12-30"
    - "2026-12-31"
  extra_workdays: []             # 週末/祝日でも出勤する日（最優先で対象化）

idempotency:
  check_existing: true           # 打刻前に GET で当日の同種打刻を確認し、あればスキップ

token:
  path: "config/token.json"      # 再発行トークンの保存先（.gitignore 済み）
  refresh_threshold_days: 7      # 有効期限がこの日数以内になったら自動再発行

# ===== カレンダー連動デーモン（推奨）=====
# デーモン(punch daemon / launchd)は退勤時刻を sukesan のカレンダーに合わせて動的に決めます。
# 接続情報（SUKESAN_BASE_URL / SUKESAN_API_KEY）は .env で設定します。
calendar:
  enabled: true                  # false なら退勤は従来の固定時刻(work.clock_out)のみ
  # 末尾イベント除外キーワード（タイトル部分一致）。
  # カレンダー末尾から、これらに一致するイベントを飛ばして最後の「業務」イベントの終了時刻を採用します。
  exclude_keywords:
    - "会食"
    - "懇親会"
    - "飲み会"
    - "打ち上げ"
    - "歓迎会"
    - "送別会"
    - "忘年会"
    - "新年会"
  refresh_interval_minutes: 15   # デーモンがカレンダーを再取得する間隔（分）

  # 休暇の自動検知: タイトルが下記キーワードに部分一致し、かつ「終日」または
  # 「leave_min_duration_hours 時間以上」のイベントがあれば、その日は打刻しない。
  # AKASHI は休暇申請日でも打刻を受理するため、この検知が休暇日の誤打刻を防ぐ主手段。
  # 誤検知時の復旧: カレンダーを修正して `punch recheck`。
  leave_keywords:
    - "休暇"
    - "有給"
    - "年休"
    - "全休"
    - "休み"
  leave_min_duration_hours: 4    # 時間指定イベントを休暇と見なす最小継続時間（短時間の中抜け誤検知防止）

daemon:
  tick_seconds: 30               # メインループの tick 間隔（秒）
  wake_lead_minutes: 1           # 打刻の何分前に Mac を起こすか（pmset）
  manage_wake: true              # sudoers 設定済みなら true。false なら pmset を触らない
  late_grace_minutes: 10         # 目標時刻からこの分数を超えて遅延したら打刻せずスキップ（誤時刻打刻ガード）
